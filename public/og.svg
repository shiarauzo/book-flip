<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#f3efe7" />
      <stop offset="100%" stop-color="#e3ded4" />
    </radialGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27574e" />
      <stop offset="100%" stop-color="#173f39" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- book -->
  <g transform="translate(120 95) rotate(-4)">
    <rect x="14" y="18" width="300" height="410" rx="6" fill="#000" opacity="0.12" />
    <rect width="300" height="410" rx="6" fill="url(#cover)" />
    <rect x="22" y="22" width="256" height="366" rx="3" fill="none" stroke="#d8b46a" stroke-width="2.5" />
    <rect x="30" y="30" width="240" height="350" rx="2" fill="none" stroke="#d8b46a" stroke-width="1.2" opacity="0.8" />
    <text x="150" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="40" letter-spacing="3" fill="#f3ead2">ALICE'S</text>
    <text x="150" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="22" letter-spacing="3" fill="#d8b46a">ADVENTURES IN</text>
    <text x="150" y="245" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="42" letter-spacing="2" fill="#f3ead2">WONDERLAND</text>
    <line x1="90" y1="280" x2="210" y2="280" stroke="#d8b46a" stroke-width="1.5" />
    <text x="150" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="22" letter-spacing="4" fill="#d8b46a">LEWIS CARROLL</text>
  </g>

  <!-- copy -->
  <g transform="translate(560 250)">
    <text font-family="Georgia, serif" font-size="64" fill="#1f3a34">A 3D book</text>
    <text y="78" font-family="Georgia, serif" font-size="64" fill="#1f3a34">you can read.</text>
    <text y="150" font-family="system-ui, sans-serif" font-size="26" fill="#6b6354">Click to turn each page — every leaf lifts</text>
    <text y="186" font-family="system-ui, sans-serif" font-size="26" fill="#6b6354">and curls like real paper. WebGL · R3F.</text>
  </g>
</svg>
